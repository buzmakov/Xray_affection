services:

  # -----------------------------------------------------------------------
  # Симуляция Geant4 (batch-режим, без GUI)
  # Запуск: docker compose up --build
  # Запуск с другим макросом: MACRO=energy.mac docker compose up --build
  # -----------------------------------------------------------------------
  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    image: xray-affection:latest
    container_name: xray-simulation
    volumes:
      # Результаты симуляции (hits_data.csv, output.root) сохраняются на хосте
      - ./results:/app/results
    working_dir: /app
    # Перенаправляем выходные файлы в папку results
    command: >
      sh -c "
        /app/sim ${MACRO:-run.mac} &&
        [ -f /app/hits_data.csv ]  && cp /app/hits_data.csv  /app/results/hits_data_${THICKNESS:-100}um.csv || true &&
        [ -f /app/output.root ]    && cp /app/output.root    /app/results/ || true &&
        [ -f /app/run_params.txt ] && cp /app/run_params.txt /app/results/ || true
      "
    entrypoint: []
    environment:
      # Geant4 data paths (наследуются из Dockerfile)
      - G4ENSDFSTATEDATA=/opt/geant4/share/Geant4/data/G4ENSDFSTATE2.3
      - G4LEVELGAMMADATA=/opt/geant4/share/Geant4/data/PhotonEvaporation5.7
      - G4RADIOACTIVEDATA=/opt/geant4/share/Geant4/data/RadioactiveDecay5.6
      - G4PARTICLEXSDATA=/opt/geant4/share/Geant4/data/G4PARTICLEXS4.0
      - G4PIIDATA=/opt/geant4/share/Geant4/data/G4PII1.3
      - G4REALSURFACEDATA=/opt/geant4/share/Geant4/data/RealSurface2.2
      - G4SAIDXSDATA=/opt/geant4/share/Geant4/data/G4SAIDDATA2.0
      - G4ABLADATA=/opt/geant4/share/Geant4/data/G4ABLA3.3
      - G4INCLDATA=/opt/geant4/share/Geant4/data/G4INCL1.2
      - G4LEDATA=/opt/geant4/share/Geant4/data/G4EMLOW8.5
      - G4NEUTRONHPDATA=/opt/geant4/share/Geant4/data/G4NDL4.7
      - LD_LIBRARY_PATH=/opt/geant4/lib

  # -----------------------------------------------------------------------
  # Постобработка: CSV → PNG рентгенограммы
  # Запуск отдельно: docker compose run postprocess
  # Требует наличия results/hits_data.csv после симуляции
  # -----------------------------------------------------------------------
  postprocess:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: xray-affection:latest
    container_name: xray-postprocess
    volumes:
      - ./results:/app/results
    working_dir: /app
    entrypoint: []
    command: python3 /app/img.py
    profiles:
      - postprocess
